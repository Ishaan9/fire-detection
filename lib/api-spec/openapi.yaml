openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: fire-detection
    description: Fire detection operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /fire-detection/analyze:
    post:
      operationId: analyzeVideo
      tags: [fire-detection]
      summary: Analyze video for fire detection
      description: Upload a video file and detect the first occurrence of fire. Streams SSE events with progress and result.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                video:
                  type: string
                  format: binary
                  description: Video file to analyze
              required:
                - video
      responses:
        "200":
          description: SSE stream with detection progress and result
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /fire-detection/history:
    get:
      operationId: getFireDetectionHistory
      tags: [fire-detection]
      summary: Get fire detection history
      description: Returns a list of past fire detection analyses
      responses:
        "200":
          description: List of fire detection records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FireDetectionRecord"
  /fire-detection/history/{id}:
    delete:
      operationId: deleteFireDetectionRecord
      tags: [fire-detection]
      summary: Delete a fire detection record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Record deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
    FireDetectionResult:
      type: object
      properties:
        detected:
          type: boolean
        timestamp:
          type: number
        timestampFormatted:
          type: string
        confidence:
          type: string
        thumbnailBase64:
          type: string
        message:
          type: string
      required:
        - detected
        - message
    FireDetectionRecord:
      type: object
      properties:
        id:
          type: integer
        videoName:
          type: string
        detected:
          type: boolean
        detectedAtSeconds:
          type: number
          nullable: true
        timestampFormatted:
          type: string
          nullable: true
        confidence:
          type: string
          nullable: true
        thumbnailBase64:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - videoName
        - detected
        - createdAt
